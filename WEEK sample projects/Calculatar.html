<html>
<head>
    <title>Calculator</title>
</head>
<body>

<h2>Simple Calculator</h2>

<input id="num1" placeholder="Enter first number">

<input id="num2" placeholder="Enter second number">

<p id="result">Result will appear here</p>


<button onclick="calc('+')">Add (+)</button>
<button onclick="calc('-')">Subtract (-)</button>
<button onclick="calc('*')">Multiply (*)</button>
<button onclick="calc('/')">Divide (/)</button>
<button onclick="calc('%')">Modulus (%)</button>

<script>
function calc(op) {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    let result;

    if (op === '+') {
        result = a + b;
    } 
    else if (op === '-') {
        result = a - b;
    } 
    else if (op === '*') {
        result = a * b;
    } 
    else if (op === '/') {
        result = b !== 0 ? a / b : "Cannot divide by 0";
    } 
    else if (op === '%') {
        result = a % b;
    }

    document.getElementById("result").innerText = a + " " + op + " " + b + " = " + result;
}
</script>

</body>
</html>
