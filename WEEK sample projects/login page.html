<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airline Seat Selection System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:900px;
    height:550px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0px 0px 25px rgba(0,0,0,0.4);
}

.left-panel{
    width:50%;
    background:url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1200') no-repeat center center/cover;
    position:relative;
}

.left-panel::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.left-content{
    position:absolute;
    z-index:2;
    color:white;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.left-content h1{
    font-size:38px;
    margin-bottom:15px;
}

.left-content p{
    font-size:18px;
}

.right-panel{
    width:50%;
    padding:50px;
}

.logo{
    text-align:center;
    font-size:28px;
    color:#0f2027;
    font-weight:bold;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#333;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    outline:none;
    font-size:16px;
}

.input-box input:focus{
    border-color:#2c5364;
}

.login-btn{
    width:100%;
    padding:14px;
    background:#2c5364;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#203a43;
}

.modules{
    margin-top:30px;
}

.modules h3{
    margin-bottom:15px;
    color:#0f2027;
}

.module-list{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.module{
    background:#e8f0fe;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-size:14px;
    font-weight:bold;
    color:#203a43;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left-panel">
        <div class="left-content">
            <h1>Airline Seat Selection</h1>
            <p>Book Your Preferred Flight Seat Easily</p>
        </div>
    </div>

    <!-- Right Side -->
    <div class="right-panel">

        <div class="logo">Passenger Login</div>

        <form onsubmit="loginFunction(event)">

            <div class="input-box">
                <label>Email ID</label>
                <input type="email" placeholder="Enter Email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Enter Password" required>
            </div>

            <button class="login-btn">Login</button>

        </form>

        <div class="modules">
            <h3>Project Modules</h3>

            <div class="module-list">

                <div class="module">1. Login Page</div>
                <div class="module">2. Flight Search</div>
                <div class="module">3. Seat Selection</div>
                <div class="module">4. Booking Confirmation</div>
                <div class="module">5. Admin Dashboard</div>

            </div>
        </div>

        <div class="footer">
            Airline Seat Selection System © 2026
        </div>

    </div>

</div>

<script>

function loginFunction(event){
    event.preventDefault();

    alert("Login Successful! Welcome to Airline Seat Selection System");

    // Redirect Example
    // window.location.href = "flight-search.html";
}

</script>

</body>
</html>
